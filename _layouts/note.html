---
layout: default
---

<article class="entry note-entry">
  <header class="note-hero reveal">
    <a class="back-link" href="{{ '/#notes' | relative_url }}">← 回到记录</a>
    <p class="eyebrow">Note</p>
    <h1>{{ page.title }}</h1>
    <div class="meta meta--large">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
      {% for tag in page.tags %}
        <span>{{ tag }}</span>
      {% endfor %}
    </div>
  </header>

  {% if page.cover %}
    <img class="note-cover reveal delay-1" src="{{ page.cover | relative_url }}" alt="{{ page.title }}">
  {% endif %}

  <div class="entry-content reveal">
    {{ content }}
  </div>
</article>
