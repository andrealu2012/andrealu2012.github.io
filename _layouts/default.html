<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.summary | default: site.description }}">
  <title>{% if page.title and page.title != '首页' %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}首页">
      <span class="brand__mark">L</span>
      <span>乐屋明</span>
    </a>
    <nav class="site-nav" aria-label="主要导航">
      <a href="{{ '/#projects' | relative_url }}">作品</a>
      <a href="{{ '/#notes' | relative_url }}">记录</a>
      <a href="{{ '/#about' | relative_url }}">关于</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ site.time | date: "%Y" }} 乐屋明 / Andrea Lu</span>
    <span>Robotics, tools, experiments.</span>
  </footer>

  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
